server {
    listen 80;
    server_name localhost;
    
    root /usr/share/nginx/html;
    index index.html;

    # Route all standard traffic to the index file
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block API calls at the Nginx level just to be safe
    location /api/ {
        return 404;
    }
}