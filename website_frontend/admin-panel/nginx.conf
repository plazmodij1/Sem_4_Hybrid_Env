server {
    listen 80;
    server_name localhost;
    
    root /usr/share/nginx/html;
    index index.html;

    # Specifically handle the /admin path coming from the ALB
    location /admin {
        alias /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Block API calls
    location /api/ {
        return 404;
    }
}