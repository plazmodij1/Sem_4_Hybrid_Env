<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid Container Portal - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/admin/style.css">
</head>

<body class="bg-gray-900 text-gray-100 min-h-screen p-8">

    <div class="max-w-4xl mx-auto space-y-8">
        <header class="border-b border-gray-700 pb-4">
            
            <h1 class="text-3xl font-bold text-orange-400">Admin Control Panel</h1>
            <p class="text-gray-400 mt-1">Full infrastructure and configuration management</p>
            <a class="text-gray-400 mt-1" id="loggedUser"></a>

            <form id="loginForm" class="space-y-4">
                <div id="login" class="flex gap-2 mt-4">
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded transition">Login</button>
                </div>
            </form>

            <form id="logoutForm" class="space-y-4">
                <div id="logout" class="flex gap-2 mt-4">
                    <button type="submit"class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded transition">Logout</button>
                </div>
            </form>
        </header>

        <div id="statusAlert" class="hidden bg-green-800 border border-green-600 text-green-100 px-4 py-3 rounded relative" role="alert">
            <strong class="font-bold">Success!</strong>
            <span class="block sm:inline" id="statusMessage">Action completed.</span>
            <div class="mt-2 text-sm" id="statusLinkBox"></div>
        </div>

        <div id="main" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <section class="bg-gray-800 p-6 rounded-lg shadow-lg border border-gray-700">
                <h2 class="text-xl font-semibold mb-4 border-b border-gray-600 pb-2">New Deployment</h2>
                <form id="deployForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">User ID</label>
                        <input type="text" id="deployUser" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white" value="admin_01" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Container Template</label>
                        <select id="deployTemplate" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white">
                            <option value="website-template-1">Template 1</option>
                            <option value="website-template-2">Template 2</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Custom Name</label>
                        <input type="text" id="deployName" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white" placeholder="e.g., test-app" required>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded transition">Deploy Container</button>
                </form>
            </section>

            <section class="bg-gray-800 p-6 rounded-lg shadow-lg border border-gray-700">
                <h2 class="text-xl font-semibold mb-4 border-b border-gray-600 pb-2 text-orange-400">Admin Config Update</h2>
                <form id="updateForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Admin ID</label>
                        <input type="text" id="adminUser" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white" value="admin_01" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Target Container Name</label>
                        <input type="text" id="updateTargetName" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white" placeholder="e.g., test-app" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Listen Port (Update)</label>
                        <input type="text" id="updatePort" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white" placeholder="8080">
                    </div>
                    <button type="submit" class="w-full bg-orange-600 hover:bg-orange-500 text-white font-bold py-2 px-4 rounded transition">Push Config Update</button>
                </form>
            </section>

            <section class="bg-gray-800 p-6 rounded-lg shadow-lg border border-gray-700 md:col-span-2">
                <h2 class="text-xl font-semibold mb-4 border-b border-red-900 pb-2 text-red-500">Infrastructure Teardown</h2>
                <p class="text-sm text-gray-400 mb-4">Permanently destroy container, ALB routing rules, and GitOps state.</p>
                <form id="deleteForm" class="space-y-4 flex flex-col md:flex-row md:items-end md:space-x-4 md:space-y-0">
                    <div class="flex-1">
                        <label class="block text-sm font-medium mb-1">Target Container Name</label>
                        <input type="text" id="deleteTargetName" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white" placeholder="e.g., test-app" required>
                    </div>
                    <button type="submit" class="w-full md:w-auto bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-6 rounded transition">Destroy Environment</button>
                </form>
            </section>
        </div>
    </div>

    <script type="module" src="/admin/script.js"></script>
</body>
</html>
