<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid Container Portal - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-8">

    <div class="max-w-4xl mx-auto space-y-8">
        <header class="border-b border-gray-700 pb-4">
            <h1 class="text-3xl font-bold text-orange-400">Admin Control Panel</h1>
            <p class="text-gray-400 mt-1">Full infrastructure and configuration management</p>
        </header>

        <div id="statusAlert" class="hidden bg-green-800 border border-green-600 text-green-100 px-4 py-3 rounded relative" role="alert">
            <strong class="font-bold">Success!</strong>
            <span class="block sm:inline" id="statusMessage">Action completed.</span>
            <div class="mt-2 text-sm" id="statusLinkBox"></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <section class="bg-gray-800 p-6 rounded-lg shadow-lg border border-gray-700">
                <h2 class="text-xl font-semibold mb-4 border-b border-gray-600 pb-2">New Deployment</h2>
                <form id="deployForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">User ID</label>
                        <input type="text" id="deployUser" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white" value="admin_01" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Container Template</label>
                        <select id="deployTemplate" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white">
                            <option value="apache-web">Apache Web Server</option>
                            <option value="mysql-8">MySQL 8 Database</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Custom Name</label>
                        <input type="text" id="deployName" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white" placeholder="e.g., test-app" required>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded transition">Deploy Container</button>
                </form>
            </section>

            <section class="bg-gray-800 p-6 rounded-lg shadow-lg border border-gray-700">
                <h2 class="text-xl font-semibold mb-4 border-b border-gray-600 pb-2 text-orange-400">Admin Config Update</h2>
                <form id="updateForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Admin ID</label>
                        <input type="text" id="adminUser" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white" value="admin_01" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Target Container Name</label>
                        <input type="text" id="updateTargetName" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white" placeholder="e.g., test-app" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Listen Port (Update)</label>
                        <input type="text" id="updatePort" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white" placeholder="8080">
                    </div>
                    <button type="submit" class="w-full bg-orange-600 hover:bg-orange-500 text-white font-bold py-2 px-4 rounded transition">Push Config Update</button>
                </form>
            </section>

            <section class="bg-gray-800 p-6 rounded-lg shadow-lg border border-gray-700 md:col-span-2">
                <h2 class="text-xl font-semibold mb-4 border-b border-red-900 pb-2 text-red-500">Infrastructure Teardown</h2>
                <p class="text-sm text-gray-400 mb-4">Permanently destroy container, ALB routing rules, and GitOps state.</p>
                <form id="deleteForm" class="space-y-4 flex flex-col md:flex-row md:items-end md:space-x-4 md:space-y-0">
                    <div class="flex-1">
                        <label class="block text-sm font-medium mb-1">Target Container Name</label>
                        <input type="text" id="deleteTargetName" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white" placeholder="e.g., test-app" required>
                    </div>
                    <button type="submit" class="w-full md:w-auto bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-6 rounded transition">Destroy Environment</button>
                </form>
            </section>
        </div>
    </div>

    <script>
        const API_BASE_URL = "/api";
        const DOMAIN_SUFFIX = "sandbox.fontys-proftask.lat";

        function showAlert(message, link = null, isError = false) {
            const alertBox = document.getElementById('statusAlert');
            const msgBox = document.getElementById('statusMessage');
            const linkBox = document.getElementById('statusLinkBox');
            
            alertBox.classList.remove('hidden', 'bg-green-800', 'border-green-600', 'bg-red-800', 'border-red-600');
            alertBox.classList.add(isError ? 'bg-red-800' : 'bg-green-800');
            alertBox.classList.add(isError ? 'border-red-600' : 'border-green-600');
            
            msgBox.innerText = message;
            
            if (link) {
                linkBox.innerHTML = `Environment URL: <a href="${link}" target="_blank" class="underline text-blue-300 hover:text-blue-200">${link}</a>`;
            } else {
                linkBox.innerHTML = '';
            }
        }

        // Handle Deploy
        document.getElementById('deployForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const customName = document.getElementById('deployName').value.toLowerCase();
            const payload = {
                user_id: document.getElementById('deployUser').value,
                role: "admin",
                container_template: document.getElementById('deployTemplate').value,
                custom_name: customName
            };

            try {
                const response = await fetch(`${API_BASE_URL}/deploy`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!response.ok) throw new Error(await response.text());
                const expectedUrl = `http://${customName}.${DOMAIN_SUFFIX}`;
                showAlert('Deployment Triggered! AWS is currently provisioning your infrastructure.', expectedUrl);
            } catch (error) {
                showAlert(`Deployment Failed: ${error.message}`, null, true);
            }
        });

        // Handle Admin Update
        document.getElementById('updateForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                user_id: document.getElementById('adminUser').value,
                role: "admin",
                container_name: document.getElementById('updateTargetName').value,
                updated_parameters: {
                    listen_port: document.getElementById('updatePort').value || undefined
                }
            };
            Object.keys(payload.updated_parameters).forEach(key => {
                if (payload.updated_parameters[key] === undefined) delete payload.updated_parameters[key];
            });

            try {
                const response = await fetch(`${API_BASE_URL}/config/update`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!response.ok) throw new Error(await response.text());
                showAlert('Config Update successfully pushed to GitOps pipeline!');
            } catch (error) {
                showAlert(`Update Failed: ${error.message}`, null, true);
            }
        });

        // Handle Teardown
        document.getElementById('deleteForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const containerName = document.getElementById('deleteTargetName').value;
            const userId = "admin_01"; 
            const role = "admin";

            if(!confirm(`Are you absolutely sure you want to destroy ${containerName}? This cannot be undone.`)) return;

            try {
                const response = await fetch(`${API_BASE_URL}/deployments/${containerName}?user_id=${userId}&role=${role}`, {
                    method: 'DELETE'
                });
                if (!response.ok) throw new Error(await response.text());
                showAlert(`Successfully destroyed ${containerName}.`);
                document.getElementById('deleteTargetName').value = '';
            } catch (error) {
                showAlert(`Teardown Failed: ${error.message}`, null, true);
            }
        });
    </script>
</body>
</html>
