name: Sync Deployments to AWS S3

on:
  push:
    branches:
      - deployments

permissions:
  id-token: write
  contents: read

jobs:
  sync-to-s3:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::027053845110:role/GitHubActionsS3SyncRole #change the account id
          aws-region: eu-central-1

      - name: Sync JSON configs to S3 Master Bucket
        run: |
          aws s3 sync ./ s3://fontys-marko-config-master/ \
            --exclude "*" \
            --include "*.json" \
            --delete